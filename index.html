
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI','Noto Sans Tamil',sans-serif;background:#0F0E17;color:#fff;min-height:100vh;user-select:none}
.scr{display:none;min-height:100vh;flex-direction:column}
.scr.on{display:flex}

/* HOME */
#home{background:radial-gradient(ellipse at 30% 20%,#1a0a2e,#0F0E17 60%);align-items:center;justify-content:center;padding:20px;text-align:center}
.logo{background:linear-gradient(135deg,#FF6B35,#ff9500);padding:8px 22px;border-radius:50px;font-size:12px;font-weight:700;letter-spacing:2px;display:inline-block;margin-bottom:16px;animation:pp 2s ease-in-out infinite}
@keyframes pp{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.htitle{font-size:42px;font-weight:800;background:linear-gradient(135deg,#fff,#FFE66D,#FF6B35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;margin-bottom:6px}
.hsub{color:#4ECDC4;font-size:16px;font-weight:600;margin-bottom:20px}
.grade-row{display:flex;gap:10px;justify-content:center;margin-bottom:20px}
.gb{background:#1A1929;border:2px solid transparent;border-radius:14px;padding:12px 16px;cursor:pointer;color:#fff;font-size:15px;font-weight:800;transition:all .2s;min-width:52px}
.gb:hover,.gb.on{border-color:#FF6B35;background:rgba(255,107,53,.15);color:#FF6B35}
.mode-row{display:flex;gap:8px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.mb{padding:8px 16px;border-radius:50px;border:1.5px solid rgba(255,255,255,.2);background:transparent;color:#A7A9BE;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.mb.on{border-color:#4ECDC4;background:rgba(78,205,196,.15);color:#4ECDC4}
.lang-row{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.lb{padding:7px 20px;border-radius:50px;border:2px solid #4ECDC4;background:transparent;color:#4ECDC4;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s}
.lb.on{background:#4ECDC4;color:#0a2e2e}
.stbtn{width:100%;max-width:320px;padding:14px;background:linear-gradient(135deg,#FF6B35,#ff9500);border:none;border-radius:14px;color:#fff;font-size:18px;font-weight:800;cursor:pointer;transition:all .2s;margin-bottom:8px}
.stbtn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,107,53,.4)}
.stbtn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.free{background:#6BCB77;color:#0a2e0f;font-size:11px;font-weight:700;padding:4px 14px;border-radius:50px;display:inline-block}

/* GAME */
#game{background:#0F0E17}
.ghdr{background:#1A1929;padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.07)}
.sc-b{background:linear-gradient(135deg,#FFE66D,#f97316);color:#1a0a00;font-weight:800;font-size:13px;padding:4px 12px;border-radius:50px}
.str-b{background:#252438;color:#FF6B35;font-weight:700;font-size:12px;padding:4px 10px;border-radius:50px}
.prg{flex:1;background:rgba(255,255,255,.1);border-radius:50px;height:5px;overflow:hidden}
.prg-f{height:100%;background:linear-gradient(90deg,#4ECDC4,#6BCB77);border-radius:50px;transition:width .5s}
.qcnt{font-size:11px;color:#A7A9BE;white-space:nowrap}
.gbody{flex:1;padding:14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.scene-box{background:#1A1929;border-radius:16px;overflow:hidden}
.scene-box svg{display:block;width:100%}
.qbox{background:#1A1929;border-radius:16px;padding:14px}
.qtag{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:3px 10px;border-radius:50px;margin-bottom:8px}
.qtag.math{background:rgba(255,107,53,.2);color:#FF6B35}
.qtag.tamil{background:rgba(167,139,250,.2);color:#A78BFA}
.qtag.english{background:rgba(78,205,196,.2);color:#4ECDC4}
.qtag.science{background:rgba(107,203,119,.2);color:#6BCB77}
.qtxt{font-size:18px;font-weight:700;line-height:1.4;margin-bottom:8px}

/* AUDIO BTN */
.au-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;background:rgba(78,205,196,.12);border:1.5px solid #4ECDC4;border-radius:50px;color:#4ECDC4;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:6px}
.au-btn:active{transform:scale(.96)}
.au-btn.play{background:#4ECDC4;color:#0a2e2e}
.au-wave{display:flex;gap:2px;align-items:center;height:16px}
.au-bar{width:3px;border-radius:2px;background:currentColor;animation:wave 0.8s ease-in-out infinite}
.au-bar:nth-child(1){height:6px;animation-delay:0s}
.au-bar:nth-child(2){height:10px;animation-delay:.15s}
.au-bar:nth-child(3){height:14px;animation-delay:.3s}
.au-bar:nth-child(4){height:10px;animation-delay:.45s}
.au-bar:nth-child(5){height:6px;animation-delay:.6s}
@keyframes wave{0%,100%{transform:scaleY(.5)}50%{transform:scaleY(1)}}

/* MCQ */
.opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}
.obtn{background:#1A1929;border:2px solid rgba(255,255,255,.08);border-radius:13px;padding:13px 10px;cursor:pointer;font-size:15px;font-weight:600;color:#fff;transition:all .2s;text-align:center;min-height:54px;display:flex;align-items:center;justify-content:center;width:100%}
.obtn:active{transform:scale(.97)}
.obtn.cor{border-color:#6BCB77;background:rgba(107,203,119,.2)}
.obtn.wrg{border-color:#ef4444;background:rgba(239,68,68,.15)}

/* FEEDBACK */
.fb{border-radius:13px;padding:12px 14px;font-size:13px;line-height:1.5;display:none;margin-top:10px}
.fb.on{display:block}
.fb.g{background:rgba(107,203,119,.12);border:1px solid rgba(107,203,119,.3);color:#86efac}
.fb.b{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.22);color:#fca5a5}
.fb-t{font-weight:700;font-size:15px;margin-bottom:3px}
.nxt{width:100%;padding:13px;background:linear-gradient(135deg,#4ECDC4,#22d3ee);border:none;border-radius:13px;color:#0a2e2e;font-size:16px;font-weight:800;cursor:pointer;display:none;margin-top:10px;transition:all .2s}
.nxt.on{display:block}
.nxt:active{transform:scale(.98)}

/* DRAG DROP */
.dd-wrap{background:#1A1929;border-radius:16px;padding:14px;margin-top:10px}
.dd-pool{display:flex;flex-wrap:wrap;gap:8px;min-height:52px;padding:10px;background:#252438;border-radius:12px;margin-bottom:14px;transition:all .2s}
.dd-pool.dragover{background:rgba(78,205,196,.1);border:1.5px dashed #4ECDC4}
.chip{padding:10px 18px;border-radius:50px;font-size:15px;font-weight:700;cursor:grab;transition:all .2s;touch-action:none;position:relative}
.chip.dragging{opacity:.4;transform:scale(.95)}
.chip.ghost{position:fixed;pointer-events:none;z-index:9999;transform:scale(1.08);box-shadow:0 8px 24px rgba(0,0,0,.4);transition:none}
.dd-slots{display:flex;flex-direction:column;gap:10px}
.slot-row{display:flex;align-items:center;gap:10px}
.slot-lbl{font-size:12px;color:#A7A9BE;min-width:80px;text-align:right;flex-shrink:0}
.slot{flex:1;min-height:48px;border:2px dashed rgba(255,255,255,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;padding:6px 10px;transition:all .2s;background:rgba(255,255,255,.03);cursor:pointer}
.slot.over{border-color:#4ECDC4;background:rgba(78,205,196,.1);border-style:solid}
.slot.has{border-style:solid;border-color:rgba(255,255,255,.2)}
.slot.cor{border-color:#6BCB77!important;background:rgba(107,203,119,.15)!important}
.slot.wrg{border-color:#ef4444!important;background:rgba(239,68,68,.1)!important}
.slot-empty-txt{color:#A7A9BE;font-size:12px}
.dd-check{width:100%;padding:12px;background:linear-gradient(135deg,#A78BFA,#7c3aed);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;margin-top:12px;transition:all .2s}
.dd-check:active{transform:scale(.98)}

/* RESULT */
#result{background:#0F0E17;align-items:center;justify-content:center;padding:20px}
.rc{background:#1A1929;border-radius:22px;padding:28px 22px;max-width:360px;width:100%;text-align:center}
.re{font-size:60px;margin-bottom:10px}
.rt{font-size:26px;font-weight:800;margin-bottom:6px}
.rs{color:#A7A9BE;font-size:14px;margin-bottom:22px}
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:22px}
.sbox{background:#252438;border-radius:13px;padding:13px 8px;text-align:center}
.sn{font-size:24px;font-weight:800}
.sl{font-size:10px;color:#A7A9BE;margin-top:2px}
.rpbtn{width:100%;padding:13px;background:linear-gradient(135deg,#FF6B35,#ff9500);border:none;border-radius:13px;color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-bottom:10px;transition:all .2s}
.rpbtn:active{transform:scale(.98)}
.mb2{width:100%;padding:11px;background:#252438;border:1px solid rgba(255,255,255,.1);border-radius:13px;color:#A7A9BE;font-size:14px;font-weight:600;cursor:pointer}
.ld{display:flex;align-items:center;gap:10px;padding:14px;background:#1A1929;border-radius:13px;color:#A7A9BE;font-size:13px}
.dots{display:flex;gap:4px}
.dot{width:6px;height:6px;border-radius:50%;background:#4ECDC4;animation:db 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes db{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1);opacity:1}}
</style>

<!-- HOME -->
<div id="home" class="scr on">
  <div class="logo">🚀 EduQuest Lanka 3.0</div>
  <div class="htitle">கற்றல் ஒரு சாகசம்!</div>
  <div class="hsub">Learning is an Adventure!</div>

  <div style="font-size:12px;color:#A7A9BE;margin-bottom:8px">மொழி தேர்வு / Language</div>
  <div class="lang-row">
    <button class="lb on" id="btn-ta" onclick="setLang('ta')">தமிழ்</button>
    <button class="lb" id="btn-en" onclick="setLang('en')">English</button>
  </div>

  <div style="font-size:12px;color:#A7A9BE;margin-bottom:8px">தரம் / Grade</div>
  <div class="grade-row">
    <button class="gb" onclick="selG(1)" id="g1">1</button>
    <button class="gb" onclick="selG(2)" id="g2">2</button>
    <button class="gb" onclick="selG(3)" id="g3">3</button>
    <button class="gb" onclick="selG(4)" id="g4">4</button>
    <button class="gb" onclick="selG(5)" id="g5">5</button>
  </div>

  <div style="font-size:12px;color:#A7A9BE;margin-bottom:8px">விளையாட்டு முறை / Mode</div>
  <div class="mode-row">
    <button class="mb on" id="m-mcq" onclick="setMode('mcq')">🎯 Quiz</button>
    <button class="mb" id="m-drag" onclick="setMode('drag')">🧩 Drag & Drop</button>
    <button class="mb" id="m-audio" onclick="setMode('audio')">🔊 Audio Quiz</button>
  </div>

  <button class="stbtn" id="stbtn" onclick="startGame()" disabled>🎮 தொடங்கு!</button>
  <div class="free">✅ முற்றிலும் இலவசம் · 100% Free</div>
</div>

<!-- GAME -->
<div id="game" class="scr">
  <div class="ghdr">
    <button onclick="goHome()" style="background:#252438;border:none;color:#fff;width:32px;height:32px;border-radius:10px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center">←</button>
    <div class="sc-b">⭐ <span id="sc">0</span></div>
    <div class="str-b">🔥 <span id="str">0</span></div>
    <div class="prg"><div class="prg-f" id="pf" style="width:0%"></div></div>
    <div class="qcnt" id="qc">1/5</div>
  </div>
  <div class="gbody">
    <div id="sceneArea"></div>
    <div id="ldArea" style="display:none"><div class="ld"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><span id="ldTxt">தயாரிக்கிறது...</span></div></div>
    <div id="qArea" style="display:none">
      <div class="qbox">
        <div class="qtag math" id="qTag">கணிதம்</div>
        <div class="qtxt" id="qTxt"></div>
        <button class="au-btn" id="auBtn" onclick="speakNow()">
          <span id="auIcon">🔊</span>
          <span id="auTxt">கேள்</span>
          <div class="au-wave" id="auWave" style="display:none">
            <div class="au-bar"></div><div class="au-bar"></div><div class="au-bar"></div><div class="au-bar"></div><div class="au-bar"></div>
          </div>
        </button>
      </div>
      <div id="interactArea"></div>
      <div class="fb" id="fb"><div class="fb-t" id="fb-t"></div><div id="fb-b"></div></div>
      <button class="nxt" id="nxt" onclick="nextQ()"><span id="nxtTxt">அடுத்த கேள்வி →</span></button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="scr">
  <div class="rc">
    <div class="re" id="rEmoji">🎉</div>
    <div class="rt" id="rTitle"></div>
    <div class="rs" id="rSub"></div>
    <div class="srow">
      <div class="sbox"><div class="sn" id="rSc" style="color:#FFE66D">0</div><div class="sl">மதிப்பெண்</div></div>
      <div class="sbox"><div class="sn" id="rCor" style="color:#6BCB77">0</div><div class="sl">சரியானவை</div></div>
      <div class="sbox"><div class="sn" id="rStr" style="color:#FF6B35">0</div><div class="sl">தொடர்</div></div>
    </div>
    <button class="rpbtn" onclick="replay()">🔄 மீண்டும் விளையாடு</button>
    <button class="mb2" onclick="goHome()">🏠 முகப்பு</button>
  </div>
</div>

<script>
/* ── STATE ── */
var ST={lang:'ta',grade:null,mode:'mcq',score:0,streak:0,maxStreak:0,correct:0,qIdx:0,total:5,answered:false,subj:'math'};
var QS=[], synth=window.speechSynthesis, currentUtterance=null, isSpeaking=false;

/* ── QUESTIONS ── */
var QB={
  math:{
    1:[
      {q:'3 + 4 = ?',o:['5','6','7','8'],a:2,e:'3 கூட்டல் 4 சமம் 7. மூன்றுடன் நான்கை கூட்டினால் ஏழு கிடைக்கும்.'},
      {q:'5 - 2 = ?',o:['1','2','3','4'],a:2,e:'ஐந்தில் இரண்டை கழித்தால் மூன்று கிடைக்கும்.'},
      {q:'2 + 2 + 2 = ?',o:['4','5','6','7'],a:2,e:'இரண்டு மூன்று முறை கூட்டினால் ஆறு கிடைக்கும்.'},
      {q:'இரண்டு கைகளில் எத்தனை விரல்கள்?',o:['8','9','10','12'],a:2,e:'ஒவ்வொரு கையிலும் ஐந்து விரல்கள். ஐந்து கூட்டல் ஐந்து சமம் பத்து.'},
      {q:'7 + 1 = ?',o:['7','8','9','10'],a:1,e:'ஏழுடன் ஒன்றை கூட்டினால் எட்டு கிடைக்கும்.'}
    ],
    2:[
      {q:'15 + 7 = ?',o:['20','21','22','23'],a:2,e:'பதினைந்து கூட்டல் ஏழு சமம் இருபத்தி இரண்டு.'},
      {q:'20 - 8 = ?',o:['10','11','12','13'],a:2,e:'இருபதில் எட்டை கழித்தால் பன்னிரண்டு கிடைக்கும்.'},
      {q:'5 × 3 = ?',o:['10','12','15','18'],a:2,e:'ஐந்து மூன்று முறை சமம் பதினைந்து.'},
      {q:'24 + 16 = ?',o:['30','38','40','42'],a:2,e:'இருபத்து நான்கு கூட்டல் பதினாறு சமம் நாற்பது.'},
      {q:'ஒரு வாரம் எத்தனை நாட்கள்?',o:['5','6','7','8'],a:2,e:'ஒரு வாரத்தில் ஏழு நாட்கள் உள்ளன.'}
    ],
    3:[
      {q:'6 × 7 = ?',o:['36','42','48','54'],a:1,e:'ஆறு பெருக்கல் ஏழு சமம் நாற்பத்தி இரண்டு.'},
      {q:'45 ÷ 9 = ?',o:['4','5','6','7'],a:1,e:'நாற்பத்தி ஐந்தை ஒன்பதால் வகுத்தால் ஐந்து கிடைக்கும்.'},
      {q:'8 × 8 = ?',o:['56','60','64','72'],a:2,e:'எட்டு பெருக்கல் எட்டு சமம் அறுபத்து நான்கு.'},
      {q:'100 - 37 = ?',o:['53','63','67','73'],a:1,e:'நூறில் முப்பத்தி ஏழை கழித்தால் அறுபத்து மூன்று கிடைக்கும்.'},
      {q:'12 × 5 = ?',o:['50','55','60','65'],a:2,e:'பன்னிரண்டு பெருக்கல் ஐந்து சமம் அறுபது.'}
    ],
    4:[
      {q:'½ + ¼ = ?',o:['¼','½','¾','1'],a:2,e:'இரண்டில் ஒரு பங்கு கூட்டல் நான்கில் ஒரு பங்கு சமம் நான்கில் மூன்று பங்கு.'},
      {q:'25% என்பது எந்த பின்னம்?',o:['1/2','1/3','1/4','1/5'],a:2,e:'இருபத்தி ஐந்து சதவீதம் என்பது நான்கில் ஒரு பங்கிற்கு சமம்.'},
      {q:'144 ÷ 12 = ?',o:['10','11','12','13'],a:2,e:'நூற்று நாற்பத்து நான்கை பன்னிரண்டால் வகுத்தால் பன்னிரண்டு கிடைக்கும்.'},
      {q:'256 ÷ 8 = ?',o:['28','30','32','36'],a:2,e:'இருநூற்று ஐம்பத்து ஆறை எட்டால் வகுத்தால் முப்பத்தி இரண்டு கிடைக்கும்.'},
      {q:'⅔ of 90 = ?',o:['45','50','60','70'],a:2,e:'தொண்ணூறில் மூன்றில் இரண்டு பங்கு என்பது அறுபது ஆகும்.'}
    ],
    5:[
      {q:'சதுர பக்கம் 7 செ.மீ. பரப்பு?',o:['28','42','49','56'],a:2,e:'சதுரத்தின் பரப்பளவு என்பது பக்கம் பெருக்கல் பக்கம். ஏழு பெருக்கல் ஏழு சமம் நாற்பத்தி ஒன்பது.'},
      {q:'√64 = ?',o:['6','7','8','9'],a:2,e:'எட்டு பெருக்கல் எட்டு சமம் அறுபத்து நான்கு. எனவே அறுபத்து நான்கின் வர்க்கமூலம் எட்டு.'},
      {q:'15² = ?',o:['175','200','225','250'],a:2,e:'பதினைந்தின் வர்க்கம் என்பது பதினைந்து பெருக்கல் பதினைந்து சமம் இருநூற்று இருபத்தி ஐந்து.'},

/* ── AUDIO ENGINE ── */
var voices=[], femaleVoice=null, femaleVoiceTa=null;

function loadVoices(){
  voices=synth.getVoices();
  /* பெண்குரல் தமிழ் தேடல் */
  var taVoices=voices.filter(function(v){return v.lang.toLowerCase().indexOf('ta')===0});
  /* Google Tamil female preferred */
  femaleVoiceTa=taVoices.find(function(v){return /female|woman|girl/i.test(v.name)})||
                taVoices.find(function(v){return /google/i.test(v.name)})||
                taVoices[0]||null;
  /* English female */
  var enVoices=voices.filter(function(v){return v.lang.toLowerCase().indexOf('en')===0});
  femaleVoice=enVoices.find(function(v){return /female|zira|samantha|karen|victoria|moira|fiona|allison|ava|susan|lisa|emma|amy/i.test(v.name)})||
              enVoices.find(function(v){return /google/i.test(v.name)&&!/male/i.test(v.name)})||
              enVoices[0]||null;
}

if(synth){
  loadVoices();
  if(synth.onvoiceschanged!==undefined)synth.onvoiceschanged=loadVoices;
}

function speakText(txt,langCode,onEnd){
  if(!synth)return;
  synth.cancel();
  isSpeaking=true;
  var u=new SpeechSynthesisUtterance(txt);
  var isTamil=langCode==='ta';
  u.lang=isTamil?'ta-IN':'en-US';
  u.rate=isTamil?0.75:0.85;
  u.pitch=isTamil?1.15:1.1;
  u.volume=1;
  if(isTamil&&femaleVoiceTa)u.voice=femaleVoiceTa;
  else if(!isTamil&&femaleVoice)u.voice=femaleVoice;
  u.onend=function(){isSpeaking=false;if(onEnd)onEnd()};
  u.onerror=function(){isSpeaking=false;if(onEnd)onEnd()};
  currentUtterance=u;
  synth.speak(u);
}

function setAudioUI(playing){
  var btn=document.getElementById('auBtn');
  var icon=document.getElementById('auIcon');
  var wave=document.getElementById('auWave');
  var txt=document.getElementById('auTxt');
  if(!btn)return;
  if(playing){
    btn.classList.add('play');
    icon.style.display='none';
    wave.style.display='flex';
    txt.textContent='கேட்கிறது...';
  } else {
    btn.classList.remove('play');
    icon.style.display='';
    wave.style.display='none';
    txt.textContent=ST.lang==='ta'?'கேள்':'Listen';
  }
}

function speakNow(){
  if(isSpeaking){synth.cancel();isSpeaking=false;setAudioUI(false);return}
  var q=QS[ST.qIdx];
  if(!q)return;
  var txt=q.q;
  setAudioUI(true);
  speakText(txt,ST.lang,function(){setAudioUI(false)});
}

/* ── GAME START ── */
function startGame(){
  if(!ST.grade)return;
  ST.score=0;ST.streak=0;ST.maxStreak=0;ST.correct=0;ST.qIdx=0;ST.answered=false;
  /* pick subject based on grade */
  var subjs=Object.keys(QB);
  ST.subj=subjs[Math.floor(Math.random()*subjs.length)];
  /* allow science only grade 2+ */
  if(ST.subj==='science'&&ST.grade<2)ST.subj='math';

  if(ST.mode==='drag'){
    var dbank=DDQ[ST.subj]||DDQ.math;
    var dg=dbank[ST.grade]||dbank[Object.keys(dbank)[0]]||[];
    QS=dg.length>0?dg.slice(0,ST.total):(QB[ST.subj]||QB.math)[ST.grade]||(QB[ST.subj]||QB.math)[1]||[];
  } else {
    var bank=(QB[ST.subj]||QB.math);
    QS=(bank[ST.grade]||bank[Object.keys(bank)[0]]||[]).slice(0,ST.total);
  }
  if(!QS||QS.length===0)QS=(QB.math[1]||[]).slice(0,ST.total);
  document.getElementById('sc').textContent='0';
  document.getElementById('str').textContent='0';
  showScr('game');
  loadQ();
}

function loadQ(){
  if(ST.qIdx>=QS.length){showResult();return}
  ST.answered=false;synth&&synth.cancel();isSpeaking=false;
  document.getElementById('pf').style.width=(ST.qIdx/QS.length*100)+'%';
  document.getElementById('qc').textContent=(ST.qIdx+1)+'/'+QS.length;
  var sc=document.getElementById('sceneArea');
  if(ST.grade<=3){var svg=getScene(ST.subj,ST.grade,ST.qIdx);sc.innerHTML=svg?'<div class="scene-box">'+svg+'</div>':''}else{sc.innerHTML=''}
  document.getElementById('ldArea').style.display='flex';
  document.getElementById('qArea').style.display='none';
  document.getElementById('fb').className='fb';
  document.getElementById('fb').style.display='none';
  document.getElementById('nxt').style.display='none';
  setTimeout(function(){
    document.getElementById('ldArea').style.display='none';
    document.getElementById('qArea').style.display='block';
    renderQ(QS[ST.qIdx]);
  },500+Math.random()*300);
}

function renderQ(q){
  var tagMap={math:'கணிதம்',tamil:'தமிழ்',english:'English',science:'அறிவியல்',shapes:'வடிவங்கள்'};
  document.getElementById('qTag').className='qtag '+ST.subj;
  document.getElementById('qTag').textContent=tagMap[ST.subj]||ST.subj;
  document.getElementById('qTxt').textContent=q.q||'';
  document.getElementById('auTxt').textContent=ST.lang==='ta'?'கேள்':'Listen';
  setAudioUI(false);

  else{renderMCQ(q,area)}
  if(ST.mode==='audio'){setTimeout(function(){speakNow()},600)}
}

/* ── DRAG & DROP — FIXED ── */
var DD={dragging:null,slotData:{},chipEl:null,ghostEl:null,startX:0,startY:0,chipW:0,chipH:0};

function renderDD(q,area){
  DD.dragging=null;DD.slotData={};DD.chipEl=null;
  if(DD.ghostEl){DD.ghostEl.remove();DD.ghostEl=null}
  var colors=q.colors||['#FF6B35','#4ECDC4','#A78BFA','#6BCB77','#FFE66D'];
  var chips=q.items.map(function(item,i){
    var c=colors[i%colors.length];
    return '<div class="chip" id="chip_'+i+'" data-idx="'+i+'" data-val="'+item+'" '
      +'style="background:'+c+'22;color:'+c+';border:2px solid '+c+'">'+item+'</div>'
  }).join('');
  var slots=q.slots.map(function(sl,i){
    return '<div class="slot-row"><div class="slot-lbl">'+sl+'</div>'
      +'<div class="slot" id="slot_'+i+'" data-slot="'+i+'"><span class="slot-empty-txt">↓ இங்கே வை</span></div></div>'
  }).join('');
  area.innerHTML='<div class="dd-wrap">'
    +'<div style="font-size:12px;color:#A7A9BE;margin-bottom:8px">🖐 chip ஐ இழுத்து slot-ல் வை</div>'
    +'<div class="dd-pool" id="dd-pool">'+chips+'</div>'
    +'<div class="dd-slots">'+slots+'</div>'
    +'<button class="dd-check" onclick="checkDD(\''+q.ans.join('|||')+'\')">✓ சரிபார்</button>'
    +'</div>';
  /* bind events after render */
  setTimeout(bindDD,0);
}

function bindDD(){
  var chips=document.querySelectorAll('.chip');
  chips.forEach(function(chip){
    /* Mouse */
    chip.addEventListener('mousedown',ddMouseDown,{passive:false});
    /* Touch */
    chip.addEventListener('touchstart',ddTouchStart,{passive:false});
  });
  /* Slots — click to place last dragged */
  document.querySelectorAll('.slot').forEach(function(slot){
    slot.addEventListener('click',function(){
      if(DD.dragging!==null){placeInSlot(DD.dragging,this.dataset.slot);DD.dragging=null}
    });
    slot.addEventListener('dragover',function(e){e.preventDefault();this.classList.add('over')});
    slot.addEventListener('dragleave',function(){this.classList.remove('over')});
    slot.addEventListener('drop',function(e){e.preventDefault();this.classList.remove('over');if(DD.dragging!==null){placeInSlot(DD.dragging,this.dataset.slot);DD.dragging=null}});
  });
}

/* Mouse drag */
function ddMouseDown(e){
  var chip=e.currentTarget;
  DD.chipEl=chip;
  DD.dragging=parseInt(chip.dataset.idx);
  var r=chip.getBoundingClientRect();
  DD.chipW=r.width;DD.chipH=r.height;
  createGhost(chip,e.clientX,e.clientY);
  chip.classList.add('dragging');
  e.preventDefault();
  document.addEventListener('mousemove',ddMouseMove);
  document.addEventListener('mouseup',ddMouseUp);
}
function ddMouseMove(e){
  if(DD.ghostEl)moveGhost(e.clientX,e.clientY);
  highlightSlot(e.clientX,e.clientY);
}
function ddMouseUp(e){
  document.removeEventListener('mousemove',ddMouseMove);
  document.removeEventListener('mouseup',ddMouseUp);
  var slot=getSlotAt(e.clientX,e.clientY);
  if(slot!==null&&DD.dragging!==null){placeInSlot(DD.dragging,slot)}
  else if(DD.chipEl){DD.chipEl.classList.remove('dragging')}
  cleanGhost();
  clearHighlights();
}

/* Touch drag */
function ddTouchStart(e){
  var chip=e.currentTarget;
  DD.chipEl=chip;
  DD.dragging=parseInt(chip.dataset.idx);
  var t=e.touches[0];
  var r=chip.getBoundingClientRect();
  DD.chipW=r.width;DD.chipH=r.height;
  createGhost(chip,t.clientX,t.clientY);
  chip.classList.add('dragging');
  e.preventDefault();
  document.addEventListener('touchmove',ddTouchMove,{passive:false});
  document.addEventListener('touchend',ddTouchEnd,{passive:false});
}
function ddTouchMove(e){
  e.preventDefault();
  var t=e.touches[0];
  if(DD.ghostEl)moveGhost(t.clientX,t.clientY);
  highlightSlot(t.clientX,t.clientY);
}
function ddTouchEnd(e){
  document.removeEventListener('touchmove',ddTouchMove);
  document.removeEventListener('touchend',ddTouchEnd);
  var t=e.changedTouches[0];
  var slot=getSlotAt(t.clientX,t.clientY);
  if(slot!==null&&DD.dragging!==null){placeInSlot(DD.dragging,slot)}
  else if(DD.chipEl){DD.chipEl.classList.remove('dragging')}
  cleanGhost();
  clearHighlights();
}

function createGhost(chip,cx,cy){
  if(DD.ghostEl)DD.ghostEl.remove();
  var g=chip.cloneNode(true);
  g.className='chip ghost';
  g.style.width=DD.chipW+'px';
  g.style.opacity='0.92';
  document.body.appendChild(g);
  DD.ghostEl=g;
  moveGhost(cx,cy);
}
function moveGhost(cx,cy){
  if(!DD.ghostEl)return;
  DD.ghostEl.style.left=(cx-DD.chipW/2)+'px';
  DD.ghostEl.style.top=(cy-DD.chipH/2)+'px';
}
function cleanGhost(){
  if(DD.ghostEl){DD.ghostEl.remove();DD.ghostEl=null}
  if(DD.chipEl){DD.chipEl.classList.remove('dragging');DD.chipEl=null}
}

function getSlotAt(cx,cy){
  var slots=document.querySelectorAll('.slot');
  for(var i=0;i<slots.length;i++){
    var r=slots[i].getBoundingClientRect();
    if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom)return parseInt(slots[i].dataset.slot);
  }
  return null;
}
function highlightSlot(cx,cy){
  document.querySelectorAll('.slot').forEach(function(s){
    var r=s.getBoundingClientRect();
    var over=cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom;
    s.classList.toggle('over',over);
  });
}
function clearHighlights(){document.querySelectorAll('.slot').forEach(function(s){s.classList.remove('over')})}

function placeInSlot(chipIdx,slotIdx){
  var chipEl=document.getElementById('chip_'+chipIdx);
  var slotEl=document.getElementById('slot_'+slotIdx);
  if(!chipEl||!slotEl)return;
  /* return old chip to pool if slot occupied */
  var oldIdx=DD.slotData[slotIdx];
  if(oldIdx!==undefined&&oldIdx!==null){
    var oldChip=document.getElementById('chip_'+oldIdx);
    if(oldChip){document.getElementById('dd-pool').appendChild(oldChip);oldChip.classList.remove('dragging')}
  }
  DD.slotData[slotIdx]=chipIdx;
  slotEl.innerHTML='';
  chipEl.classList.remove('dragging');
  slotEl.appendChild(chipEl);
  slotEl.classList.add('has');
}

function checkDD(ansStr){
  if(ST.answered)return;
  var ans=ansStr.split('|||');
  var allFilled=true;
  for(var i=0;i<ans.length;i++){if(DD.slotData[i]===undefined||DD.slotData[i]===null){allFilled=false;break}}
  if(!allFilled){
    var fb=document.getElementById('fb');
    fb.style.display='block';fb.className='fb on b';
    document.getElementById('fb-t').textContent='முதலில் எல்லா இடங்களையும் நிரப்புங்கள்!';
    document.getElementById('fb-b').textContent='Please fill all the slots first.';
    return;
  }
  ST.answered=true;
  var allOk=true;
  for(var j=0;j<ans.length;j++){
    var slotEl=document.getElementById('slot_'+j);
    var chipIdx=DD.slotData[j];
    var chipEl=document.getElementById('chip_'+chipIdx);
    var placed=chipEl?chipEl.dataset.val:'';
    var ok=placed===ans[j];
    slotEl.classList.add(ok?'cor':'wrg');
    if(!ok)allOk=false;
  }
  var q=QS[ST.qIdx];
  showFB(allOk,q);
}

/* ── FEEDBACK ── */
var correctPhrases=['அருமை! 🌟','மிகவும் சரி! ✨','சாபாஷ்! 🎉','நன்றாக சொன்னீர்கள்! 🏆','அற்புதம்! 🚀'];
var wrongPhrases=['தொடர்ந்து முயற்சி செய்! 💪','நீ கற்றுக்கொள்கிறீர்கள்! 📚','அடுத்த முறை சரியாக! ⭐'];

function showFB(ok,q){
  if(ok){ST.score+=10+(ST.streak*2);ST.streak++;ST.correct++;if(ST.streak>ST.maxStreak)ST.maxStreak=ST.streak}
  else{ST.streak=0}
  document.getElementById('sc').textContent=ST.score;
  document.getElementById('str').textContent=ST.streak;
  var fb=document.getElementById('fb');
  fb.style.display='block';
  if(ok){
    fb.className='fb on g';
    document.getElementById('fb-t').textContent=correctPhrases[Math.floor(Math.random()*correctPhrases.length)];
    document.getElementById('fb-b').textContent=q.e||'';
    if(ST.mode==='audio'||ST.mode==='mcq'){
      var spk=correctPhrases[0].replace(/[🌟✨🎉🏆🚀]/g,'');
      speakText(spk,ST.lang,null);
    }
  } else {
    fb.className='fb on b';
    document.getElementById('fb-t').textContent=wrongPhrases[Math.floor(Math.random()*wrongPhrases.length)];
    var ans=q.o?q.o[q.a]:(q.ans?(q.ans[0]):'');
    document.getElementById('fb-b').textContent='சரியான பதில்: '+(ans||'')+'. '+(q.e||'');
  }
  var nxt=document.getElementById('nxt');
  nxt.style.display='block';nxt.classList.add('on');
  document.getElementById('nxtTxt').textContent=ST.qIdx+1>=QS.length?'முடிவைப் பாரு! 🏆':'அடுத்த கேள்வி →';
}

function nextQ(){ST.qIdx++;loadQ()}

/* ── RESULT ── */
function showResult(){
  synth&&synth.cancel();
  var p=Math.round(ST.correct/QS.length*100);
  var emoji=p>=80?'🏆':p>=60?'🌟':p>=40?'😊':'💪';
  var title=p>=80?'அருமையான சாதனை!':p>=60?'மிகவும் நல்லது!':p>=40?'நல்ல முயற்சி!':'தொடர்ந்து முயற்சி செய்!';
  document.getElementById('rEmoji').textContent=emoji;
  document.getElementById('rTitle').textContent=title;
  document.getElementById('rSub').textContent=ST.correct+'/'+QS.length+' சரியான பதில்கள் — '+p+'%';
  document.getElementById('rSc').textContent=ST.score;
  document.getElementById('rCor').textContent=ST.correct+'/'+QS.length;
  document.getElementById('rStr').textContent=ST.maxStreak;
  showScr('result');
  speakText(title,'ta',null);
}

function replay(){
  ST.score=0;ST.streak=0;ST.maxStreak=0;ST.correct=0;ST.qIdx=0;
  if(ST.mode==='drag'){
    var db=DDQ[ST.subj]||DDQ.math;
    QS=(db[ST.grade]||db[Object.keys(db)[0]]||[]).slice(0,ST.total);
  } else {
    QS=((QB[ST.subj]||QB.math)[ST.grade]||[]).slice(0,ST.total);
  }
  if(!QS||!QS.length)QS=(QB.math[1]||[]).slice(0,ST.total);
  showScr('game');loadQ();
}
</script>
